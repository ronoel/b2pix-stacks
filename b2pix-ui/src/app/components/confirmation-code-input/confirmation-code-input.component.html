<div class="confirmation-section">
  <div class="confirmation-header">
    <span class="confirmation-title">Código de confirmação</span>
  </div>
  <p class="confirmation-hint">
    Últimos 3 caracteres do ID da transação PIX
  </p>

  @if (!noCode()) {
    <div class="char-inputs">
      <input
        #c0
        type="text"
        maxlength="1"
        class="char-input"
        [value]="char0()"
        [disabled]="disabled || noCode()"
        (input)="onCharInput(0, $event, c1)"
        (keydown)="onCharKeydown(0, $event, null)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        placeholder="·"
        aria-label="Primeiro caractere"
      />
      <input
        #c1
        type="text"
        maxlength="1"
        class="char-input"
        [value]="char1()"
        [disabled]="disabled || noCode()"
        (input)="onCharInput(1, $event, c2)"
        (keydown)="onCharKeydown(1, $event, c0)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        placeholder="·"
        aria-label="Segundo caractere"
      />
      <input
        #c2
        type="text"
        maxlength="1"
        class="char-input"
        [value]="char2()"
        [disabled]="disabled || noCode()"
        (input)="onCharInput(2, $event, null)"
        (keydown)="onCharKeydown(2, $event, c1)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        placeholder="·"
        aria-label="Terceiro caractere"
      />
    </div>
  }

  <p class="confirmation-helper">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
      <path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Encontre no comprovante PIX
  </p>

  <label class="no-code-label">
    <input
      type="checkbox"
      [checked]="noCode()"
      [disabled]="disabled"
      (change)="onNoCodeChange($any($event.target).checked)"
    />
    <span>Não encontrei o código</span>
  </label>

  @if (noCode()) {
    <p class="no-code-warning">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Isso pode atrasar a validação do pagamento
    </p>
  }
</div>
