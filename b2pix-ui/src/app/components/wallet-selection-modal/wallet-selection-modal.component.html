<div class="sheet-overlay" (click)="onCancel()">
  <div class="sheet" (click)="$event.stopPropagation()">
    <div class="sheet-handle"></div>

    <h2 class="sheet-title">Como deseja começar?</h2>

    <div class="wallet-options">
      <!-- Create Wallet - Highlighted -->
      <button class="wallet-option wallet-option-highlight" (click)="onSelect('create')">
        <div class="option-header">
          <div class="icon-box icon-box-primary">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M7 10h10M7 14h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="option-info">
            <div class="option-title-row">
              <span class="option-title">Criar Nova Carteira</span>
              <span class="badge badge-created">Recomendado</span>
            </div>
          </div>
        </div>
        <p class="option-description">Crie uma carteira protegida por senha. Simples e rápido.</p>
      </button>

      <!-- Import Wallet -->
      <button class="wallet-option" (click)="onSelect('import')">
        <div class="option-header">
          <div class="icon-box icon-box-neutral">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="option-info">
            <span class="option-title">Já tenho uma carteira</span>
          </div>
        </div>
        <p class="option-description">Use sua frase de recuperação para restaurar sua carteira.</p>
      </button>
    </div>
  </div>
</div>
