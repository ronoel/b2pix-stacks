<div class="history-section">
  <div class="section-header">
    <h2 class="section-title">Histórico de Compras</h2>
  </div>

  @if (isLoadingHistory()) {
    <div class="history-loading">
      <div class="loading-spinner-sm"></div>
      <span>Carregando...</span>
    </div>
  } @else if (buyOrders().length > 0) {
    <div class="history-list">
      @for (order of buyOrders(); track order.id) {
        <button class="order-card" (click)="viewOrderDetails(order)">
          <div class="order-card__left">
            <p class="order-card__amount">{{ formatBrlCents(order.buy_value) }}</p>
            <p class="order-card__detail font-mono">
              @if (order.amount) {
                {{ formatSats(order.amount) }} sats · {{ formatDateTime(order.created_at) }}
              } @else {
                {{ formatDateTime(order.created_at) }}
              }
            </p>
          </div>
          <span class="status-badge" [class]="getStatusClass(order.status)">
            {{ getStatusLabel(order.status) }}
          </span>
        </button>
      }
    </div>

    @if (hasMoreOrders()) {
      <div class="load-more">
        <button class="btn btn-ghost btn-full btn-sm" (click)="loadMoreOrders()" [disabled]="isLoadingMore()">
          @if (isLoadingMore()) {
            <div class="loading-spinner-sm"></div>
            Carregando...
          } @else {
            Carregar mais
          }
        </button>
      </div>
    }
  } @else {
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
        <path d="M2 17L12 22L22 17"/>
        <path d="M2 12L12 17L22 12"/>
      </svg>
      <p>Nenhuma compra realizada ainda</p>
    </div>
  }
</div>
