<div class="pix-key-input-group">
  <label for="pixKey" class="field-label">Sua chave PIX (CPF ou CNPJ)</label>
  <input
    type="text"
    id="pixKey"
    class="input"
    [class.input-valid]="isValid() && value()"
    [class.input-error]="!isValid() && value()"
    placeholder="000.000.000-00 ou 00.000.000/0000-00"
    [value]="displayValue()"
    (input)="onInput($event)"
    [disabled]="disabled()"
    inputmode="numeric"
  />
  @if (value() && isValid()) {
    <p class="pix-valid-feedback">{{ getDocumentType() }} válido</p>
  }
</div>
