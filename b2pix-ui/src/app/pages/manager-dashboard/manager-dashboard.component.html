<div class="manager-dashboard">
  <div class="container">
    <app-page-header
      title="Painel do Gerente"
      backRoute="/dashboard"
    />

    @if (loading()) {
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p style="color: var(--text-muted); font-size: 14px;">Carregando dados...</p>
      </div>
    } @else if (error()) {
      <div class="alert-box alert-error">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M15 9L9 15M9 9l6 6"/>
        </svg>
        <p>{{ error() }}</p>
      </div>
      <button class="btn btn-primary btn-full" (click)="loadCounts()">Tentar novamente</button>
    } @else {
      <!-- Summary Banner -->
      <div class="summary-banner" [class.summary-banner--ok]="totalActionable() === 0">
        @if (totalActionable() === 0) {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17L4 12"/>
          </svg>
          <span>Tudo em dia!</span>
        } @else {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8V12L15 15"/>
          </svg>
          <span>{{ totalActionable() }} {{ totalActionable() === 1 ? 'item requer' : 'itens requerem' }} atenção</span>
        }
      </div>

      <!-- Category Cards -->
      <div class="category-list">

        <!-- Disputas (Analyzing Orders) -->
        <button class="category-card" [class.category-card--dimmed]="analyzingCount() === 0" (click)="navigate('/order-analysis')">
          <div class="category-card__icon category-card__icon--warning">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 9V13L15 15"/>
            </svg>
          </div>
          <div class="category-card__content">
            <strong>Ordens em análise</strong>
            <span>{{ analyzingCount() === 0 ? 'Nenhuma ordem pendente' : analyzingCount() + (analyzingCount() === 1 ? ' ordem aguardando' : ' ordens aguardando') }}</span>
          </div>
          <div class="category-card__badge" [class]="analyzingCount() > 0 ? 'count-badge count-badge--warning' : 'count-badge count-badge--ok'">
            {{ analyzingCount() }}
          </div>
          <svg class="category-card__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>

        <!-- Pagamentos -->
        <button class="category-card" [class.category-card--dimmed]="waitingPaymentsCount() + failedPaymentsCount() === 0" (click)="navigate('/payment-requests')">
          <div class="category-card__icon category-card__icon--primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2V22"/>
              <path d="M17 5H9.5a2.5 2.5 0 000 5h5a2.5 2.5 0 010 5H7"/>
            </svg>
          </div>
          <div class="category-card__content">
            <strong>Pagamentos</strong>
            @if (waitingPaymentsCount() + failedPaymentsCount() === 0) {
              <span>Nenhum pagamento pendente</span>
            } @else {
              <span>
                @if (waitingPaymentsCount() > 0) { {{ waitingPaymentsCount() }} aguardando }
                @if (waitingPaymentsCount() > 0 && failedPaymentsCount() > 0) { · }
                @if (failedPaymentsCount() > 0) { {{ failedPaymentsCount() }} com falha }
              </span>
            }
          </div>
          <div class="category-card__badge" [class]="failedPaymentsCount() > 0 ? 'count-badge count-badge--danger' : waitingPaymentsCount() > 0 ? 'count-badge count-badge--warning' : 'count-badge count-badge--ok'">
            {{ waitingPaymentsCount() + failedPaymentsCount() }}
          </div>
          <svg class="category-card__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>

        <!-- Validação PIX -->
        <button class="category-card" [class.category-card--dimmed]="pixVerificationsCount() === 0" (click)="navigate('/pix-moderation')">
          <div class="category-card__icon category-card__icon--success">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12L11 14L15 10"/>
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </div>
          <div class="category-card__content">
            <strong>Validação PIX</strong>
            <span>{{ pixVerificationsCount() === 0 ? 'Nenhuma verificação pendente' : pixVerificationsCount() + (pixVerificationsCount() === 1 ? ' verificação pendente' : ' verificações pendentes') }}</span>
          </div>
          <div class="category-card__badge" [class]="pixVerificationsCount() > 0 ? 'count-badge count-badge--warning' : 'count-badge count-badge--ok'">
            {{ pixVerificationsCount() }}
          </div>
          <svg class="category-card__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>

        <!-- Disputas de Pagamento -->
        <button class="category-card" [class.category-card--dimmed]="payoutIssuesCount() === 0" (click)="navigate('/payout-disputes')">
          <div class="category-card__icon category-card__icon--danger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div class="category-card__content">
            <strong>Disputas de pagamento</strong>
            @if (payoutIssuesCount() === 0) {
              <span>Nenhuma disputa ativa</span>
            } @else {
              <span>
                @if (disputedCount() > 0) { {{ disputedCount() }} {{ disputedCount() === 1 ? 'disputa' : 'disputas' }} }
                @if (disputedCount() > 0 && escalatedCount() > 0) { · }
                @if (escalatedCount() > 0) { {{ escalatedCount() }} {{ escalatedCount() === 1 ? 'escalação' : 'escalações' }} }
              </span>
            }
          </div>
          <div class="category-card__badge" [class]="payoutIssuesCount() > 0 ? 'count-badge count-badge--danger' : 'count-badge count-badge--ok'">
            {{ payoutIssuesCount() }}
          </div>
          <svg class="category-card__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>

      </div>

      <!-- Refresh -->
      <button class="btn btn-ghost btn-full refresh-btn" (click)="loadCounts()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/>
          <path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Atualizar
      </button>
    }
  </div>
</div>
