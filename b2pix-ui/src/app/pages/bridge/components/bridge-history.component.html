<div class="bridge-history">
  <div class="section-header">
    <h3 class="section-title">Histórico</h3>
    <button class="btn btn-ghost btn-xs" (click)="refresh()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      Atualizar
    </button>
  </div>

  @if (filteredOps().length === 0) {
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
      </svg>
      <p style="color: var(--text-muted); font-size: 14px; margin: 0;">
        Nenhuma operação encontrada
      </p>
    </div>
  } @else {
    <div class="history-list">
      @for (op of filteredOps(); track op.id) {
        <div class="history-card card">
          <div class="history-card__header">
            <div class="history-card__icon icon-box icon-box-sm"
              [style.background]="op.type === 'deposit' ? 'var(--btc-bg)' : 'var(--primary-bg)'"
              [style.color]="op.type === 'deposit' ? 'var(--btc)' : 'var(--primary)'">
              @if (op.type === 'deposit') {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/>
                </svg>
              } @else {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 19V5"/><path d="M5 12l7-7 7 7"/>
                </svg>
              }
            </div>
            <div class="history-card__info">
              <span class="history-card__amount">{{ formatSats(op.amount) }} sats</span>
              <span class="history-card__date">{{ op.createdAt | date:'dd/MM/yy HH:mm' }}</span>
            </div>
            <span class="status-badge" [class]="getStatusClass(op.status)">
              {{ getStatusLabel(op.status) }}
            </span>
          </div>
        </div>
      }
    </div>
  }
</div>
