<div class="deposit-address fade-up">
  <div class="qr-container">
    <div class="qr-frame" [innerHTML]="qrSvg()"></div>
  </div>

  <div class="address-block">
    <label class="form-label">Seu endereço (Bitcoin Network)</label>
    <div class="address-display">
      <code class="font-mono">{{ address() }}</code>
      <button class="copy-btn" [class.copied]="addressCopied()" (click)="copyAddress()">
        @if (addressCopied()) {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          Copiado!
        } @else {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar
        }
      </button>
    </div>
  </div>

  <div class="fee-summary card">
    <div class="detail-row">
      <span class="detail-label">Depósito mínimo</span>
      <span class="detail-value">10.000 sats</span>
    </div>
  </div>

  <div class="alert-box alert-info">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16V12"/><path d="M12 8h.01"/>
    </svg>
    <span>Este endereço é exclusivo para a rede Bitcoin. O BTC enviado será convertido automaticamente em sBTC na Stacks Blockchain em aproximadamente 60 minutos. As taxas de rede serão descontadas do valor convertido.</span>
  </div>
</div>
