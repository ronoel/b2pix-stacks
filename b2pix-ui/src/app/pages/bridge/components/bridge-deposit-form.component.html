<div class="deposit-form fade-up">
  <div class="alert-box alert-info">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16V12"/><path d="M12 8h.01"/>
    </svg>
    <span>Será gerado um endereço Bitcoin único para você. Envie qualquer valor em BTC e ele será convertido automaticamente em sBTC.</span>
  </div>

  <button class="advanced-toggle" (click)="showAdvanced.set(!showAdvanced())">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    Configurações avançadas
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      [style.transform]="showAdvanced() ? 'rotate(180deg)' : 'rotate(0)'">
      <path d="M6 9l6 6 6-6"/>
    </svg>
  </button>

  @if (showAdvanced()) {
    <div class="advanced-fields fade-up">
      <div class="form-group">
        <label class="form-label">Taxa máxima do assinante (sats)</label>
        <input type="number" class="form-input" [(ngModel)]="maxSignerFee" placeholder="4000" />
        <span class="form-hint">Padrão: 4.000 sats. Será deduzida do valor convertido.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Tempo de bloqueio (blocos)</label>
        <input type="number" class="form-input" [(ngModel)]="reclaimLockTime" placeholder="700" />
        <span class="form-hint">Padrão: 700 blocos. Após este período, você pode recuperar seus fundos caso o depósito falhe.</span>
      </div>
    </div>
  }

  <button class="btn btn-btc btn-lg btn-full" (click)="submit()">
    Gerar Endereço de Depósito
  </button>
</div>
