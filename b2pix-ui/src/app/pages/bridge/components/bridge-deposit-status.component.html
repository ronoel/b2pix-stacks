<div class="deposit-status fade-up">
  @if (status() === 'confirmed') {
    <div class="alert-box alert-success">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      <span>Depósito confirmado! sBTC creditado com sucesso.</span>
    </div>
  }

  @if (status() === 'failed') {
    <div class="alert-box alert-error">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/>
      </svg>
      <span>Depósito falhou. Verifique o status da transação.</span>
    </div>
  }

  <div class="timeline">
    @for (step of timelineSteps(); track $index) {
      <div class="timeline-item" [class.done]="step.done" [class.active]="step.active">
        <div class="timeline-dot" [class.pulse]="step.active"></div>
        @if (!$last) {
          <div class="timeline-connector"></div>
        }
        <span class="timeline-label">{{ step.label }}</span>
      </div>
    }
  </div>

  <div class="txid-block">
    <label class="form-label">ID da Transação Bitcoin</label>
    <div class="address-display">
      <code class="font-mono">{{ btcTxid() }}</code>
      <button class="copy-btn" [class.copied]="txidCopied()" (click)="copyTxid()">
        {{ txidCopied() ? 'Copiado!' : 'Copiar' }}
      </button>
    </div>
    <a class="explorer-link" [href]="explorerUrl()" target="_blank" rel="noopener">
      Ver no Explorer
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
  </div>

  <div class="actions">
    <button class="btn btn-btc btn-lg btn-full" (click)="newDeposit.emit()">
      Novo Depósito
    </button>
    <button class="btn btn-ghost btn-sm" (click)="goToDashboard.emit()">
      Voltar ao Dashboard
    </button>
  </div>
</div>
