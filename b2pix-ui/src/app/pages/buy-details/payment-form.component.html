<div class="payment-form">

  @if (showPaymentInfo) {
    <!-- Amount + Instructions compact -->
    <div class="payment-header-card">
      <div class="amount-row">
        <span class="amount-label">Valor do PIX</span>
        <span class="amount-value">R$&nbsp;{{ fiatAmount }}</span>
      </div>
      <p class="instructions-compact">
        Copie o código ou escaneie o QR Code, pague via PIX e informe o código de confirmação abaixo.
      </p>
    </div>

    <!-- PIX Key — compact (no textarea) -->
    <app-pix-copia-cola
      [pixKey]="pixKey"
      [amount]="fiatAmountValue"
      [sellerName]="sellerName"
      [sellerCity]="sellerCity"
      [showLabel]="true"
      labelText="Pagar PIX"
    ></app-pix-copia-cola>
  }

  <!-- Confirmation Code Section -->
  <app-confirmation-code-input
    [disabled]="false"
    (codeChange)="transactionIdChanged.emit($event)"
    (noCodeChange)="noTransactionIdChanged.emit($event)"
  />

  <!-- Action Buttons -->
  <div class="form-actions">
    <button
      type="button"
      class="btn btn-btc btn-lg btn-full"
      [disabled]="!canConfirm"
      (click)="confirm.emit()"
    >
      {{ confirmLabel }}
    </button>
    @if (showPaymentInfo) {
      <button
        type="button"
        class="btn btn-ghost-danger btn-full"
        (click)="cancel.emit()"
      >
        Cancelar compra
      </button>
    }
  </div>

</div>
